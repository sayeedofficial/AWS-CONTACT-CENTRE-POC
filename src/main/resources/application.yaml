spring:
  application:
    name: contactcenter-api
  datasource:
    url: jdbc:postgresql://localhost:5432/contactcenter
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect